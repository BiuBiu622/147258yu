<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏助手</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* ==================== 新版详情面板 ==================== */
        .detail-panel-v2 {
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.01) 100%);
            border-left: 4px solid;
            border-image: var(--gradient-primary) 1;
        }

        .task-groups {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .task-group {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .task-group-header {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            border-bottom: 1px solid #f1f5f9;
        }

        .task-group-header.daily {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(96, 165, 250, 0.05) 100%);
            color: #2563eb;
        }

        .task-group-header.battle {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(52, 211, 153, 0.05) 100%);
            color: #059669;
        }

        .task-group-header.monthly {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(192, 132, 252, 0.05) 100%);
            color: #7c3aed;
        }

        .task-group-header.activity {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(251, 191, 36, 0.05) 100%);
            color: #d97706;
        }

        .task-group-body {
            padding: 8px 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
        }

        .task-item-name {
            color: var(--text-medium);
            font-weight: 500;
        }

        .badge-sm {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-sm.success {
            background: rgba(16, 185, 129, 0.15);
            color: #059669;
        }

        .badge-sm.danger {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626;
        }

        .badge-sm.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #d97706;
        }

        .badge-sm.info {
            background: rgba(59, 130, 246, 0.15);
            color: #2563eb;
        }

        .badge-sm.gray {
            background: rgba(148, 163, 184, 0.15);
            color: #64748b;
        }

        .btn.danger {
            background: #ef4444 !important;
            color: white;
        }

        .btn.danger:hover {
            background: #dc2626 !important;
        }

        .btn.warning {
            background: #f59e0b !important;
            color: white;
        }

        .btn.warning:hover {
            background: #d97706 !important;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">💎 游戏助手</a>
            <div class="navbar-nav">
                <div class="nav-link active" onclick="showPage('status')">📊 账号状态</div>
                <div class="nav-link" onclick="showPage('tools')">🧰 工具箱</div>
                <div class="nav-link" onclick="showPage('bin')">📁 BIN管理</div>
                <div class="nav-link" onclick="showPage('logs')">📝 运行日志</div>
                <a class="nav-link" href="/license.html" title="查看或更新系统授权">🔐 授权中心</a>
                <a class="nav-link" href="/boss-assist.html" target="_blank" style="text-decoration: none;">🏰
                    BOSS塔助战</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="save-status" id="saveStatus">✓ 保存成功</div>
        <!-- 账号状态页 -->
        <div id="page-status" class="page active">
            <div class="page-header">
                <h2>📊 账号状态监控</h2>
                <div class="header-right">
                    <div class="stat-box">
                        <div class="stat-value" id="totalAccounts">0</div>
                        <div class="stat-label">总账号</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="withStatus">0</div>
                        <div class="stat-label">有状态</div>
                    </div>
                    <button class="btn" id="autoRepairBtn" style="background:#f59e0b;"
                        onclick="runDailyTaskForLowActive()">⚡ 一键补差</button>
                    <button class="btn" style="background:#8b5cf6;" onclick="openGlobalSwitchModal()">🌐 全局开关</button>
                    <button class="btn" style="background:#059669;" onclick="openBatchConfigModal()">⚙️ 批量设置</button>
                    <button class="btn" onclick="loadStatusData()">🔄 刷新</button>
                </div>
            </div>
            <div class="table-container">
                <table class="status-table" id="statusTable">
                    <thead>
                        <tr>
                            <th style="text-align:left;padding-left:16px;">账号</th>
                            <th>每日任务</th>
                            <th>盐罐</th>
                            <th>挂机</th>
                            <th>竞技场</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="statusTableBody">
                        <tr>
                            <td colspan="6">
                                <div class="no-data">
                                    <div class="no-data-icon">⏳</div>
                                    <div class="no-data-text">加载中...</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- 工具箱页 -->
        <div id="page-tools" class="page">
            <iframe id="toolsFrame" src="tools.html"></iframe>
        </div>

        <!-- BIN管理页 -->
        <div id="page-bin" class="page">
            <div class="page-header">
                <h2>📁 BIN文件管理</h2>
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽BIN文件到此处上传</div>
                <div class="upload-hint">支持 .bin 格式文件，上传后自动转换Token</div>
                <input type="file" id="fileInput" accept=".bin" multiple>
            </div>
            <div class="file-list">
                <div class="file-list-header">
                    <h3>文件列表</h3><button class="btn" onclick="loadBinFiles()">🔄 刷新</button>
                </div>
                <div id="fileListContent">
                    <div class="no-data">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 运行日志页 -->
        <div id="page-logs" class="page">
            <div class="page-header">
                <h2>📝 调度器日志</h2>
                <div class="header-right">
                    <button class="btn" id="schedulerBtn" onclick="toggleScheduler()">▶️ 运行中</button>
                    <button class="btn warning" id="restartBtn" onclick="restartScheduler()">🔄 重启调度器</button>
                    <button class="btn" id="autoLogBtn" onclick="toggleAutoLog()">🔄 自动刷新</button>
                    <button class="btn secondary" onclick="loadLogs()">刷新</button>
                </div>
            </div>
            <div class="log-container" id="logContainer">
                <div class="no-data">加载中...</div>
            </div>
        </div>


    </div>

    <style>
        /* ==================== 配置弹窗 ==================== */
        .config-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .config-modal-overlay.show {
            display: flex;
        }

        .config-modal {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 960px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .config-modal-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-modal-title {
            font-size: 15px;
            font-weight: 700;
        }

        .config-modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .config-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .config-modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        /* 配置弹窗内容 - 紧凑流式布局 */
        .config-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 配置行 - 水平排列多个任务 */
        .config-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 配置区块 - 内联紧凑 */
        .config-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 14px;
            flex: 1;
            min-width: 220px;
        }

        .config-section.wide {
            min-width: 340px;
        }

        .config-section.wider {
            min-width: 380px;
        }

        .config-section.narrow {
            min-width: 140px;
            max-width: 180px;
            flex: 0.6;
        }

        .config-section.full {
            flex: 100%;
        }

        /* 区块标题行 - 标题和总开关在同一行 */
        .config-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .config-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
        }

        /* 配置项网格 */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px 16px;
        }

        .config-grid.cols-1 {
            grid-template-columns: 1fr;
        }

        .config-grid.cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .config-grid.cols-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        /* 单个配置项 */
        .cfg-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
            color: #64748b;
            gap: 8px;
        }

        .cfg-item span {
            font-weight: 500;
            white-space: nowrap;
        }

        /* 数字输入组 - 更紧凑 */
        .cfg-num {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .cfg-num input {
            width: 36px;
            height: 22px;
            text-align: center;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 12px;
        }

        .cfg-num button {
            width: 20px;
            height: 20px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .cfg-num button:hover {
            background: #f1f5f9;
        }

        /* 梦境商人 - 横向紧凑 */
        .merchant-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            border-top: 1px dashed #e2e8f0;
            margin-top: 8px;
        }

        .merchant-row:first-of-type {
            border-top: none;
            margin-top: 0;
        }

        .merchant-label {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .merchant-label.green {
            color: #059669;
            background: rgba(16, 185, 129, 0.15);
        }

        .merchant-label.yellow {
            color: #d97706;
            background: rgba(245, 158, 11, 0.15);
        }

        .merchant-label.red {
            color: #dc2626;
            background: rgba(239, 68, 68, 0.15);
        }

        .merchant-items-inline {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .merchant-items-inline .cfg-item {
            gap: 5px;
        }

        /* 开关 - 标准尺寸 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-switch .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .2s;
            border-radius: 20px;
        }

        .toggle-switch .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        .toggle-switch input:checked+.slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .toggle-switch input:checked+.slider:before {
            transform: translateX(16px);
        }

        /* 数字输入 - 小号 */
        .number-input-group {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .number-input-group input {
            width: 32px;
            height: 20px;
            text-align: center;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 11px;
            padding: 0;
        }

        .number-btn {
            width: 18px;
            height: 18px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number-btn:hover {
            background: #f1f5f9;
        }

        /* 梦境商人 - 紧凑版 */
        .merchant-group {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #e5e7eb;
        }

        .merchant-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 8px;
            margin-bottom: 4px;
            display: inline-block;
        }

        .merchant-tag.green {
            color: #059669;
            background: rgba(16, 185, 129, 0.15);
        }

        .merchant-tag.yellow {
            color: #d97706;
            background: rgba(245, 158, 11, 0.15);
        }

        .merchant-tag.red {
            color: #dc2626;
            background: rgba(239, 68, 68, 0.15);
        }

        .merchant-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px 8px;
        }

        .merchant-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            padding: 2px 0;
        }

        /* 全局开关相关样式 */
        .global-mode-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }

        .global-mode-bar .mode-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .global-mode-bar .mode-title {
            font-size: 15px;
            font-weight: 600;
        }

        .global-mode-bar .mode-desc {
            font-size: 11px;
            opacity: 0.85;
        }

        .global-switch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }

        .global-switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .global-switch-item:hover {
            border-color: #8b5cf6;
            background: #faf5ff;
        }

        .global-switch-item.disabled {
            opacity: 0.5;
            background: #f1f5f9;
        }

        .modal-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .config-modal {
                max-width: 95vw;
            }

            .config-row {
                flex-direction: column;
            }

            .config-section {
                min-width: 100%;
            }
        }

        @media (max-width: 1200px) {
            .task-groups {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .task-groups {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== 批量设置弹窗 ==================== */
        .batch-modal {
            max-width: 1100px;
            width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .batch-body {
            display: flex;
            gap: 16px;
            flex: 1;
            overflow: hidden;
            padding: 16px;
        }

        .batch-left {
            width: 240px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #e5e7eb;
            padding-right: 16px;
        }

        .batch-search {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .batch-search:focus {
            border-color: #8b5cf6;
        }

        .batch-select-all {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
        }

        .batch-account-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .batch-account-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 4px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .batch-account-item:hover {
            background: #f3f4f6;
        }

        .batch-account-item input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #8b5cf6;
        }

        .batch-right {
            flex: 1;
            overflow-y: auto;
        }

        .batch-footer {
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .batch-footer .batch-count {
            font-size: 13px;
            color: #6b7280;
        }

        .batch-footer .batch-count strong {
            color: #8b5cf6;
            font-size: 16px;
        }

        .batch-footer .btn-group {
            display: flex;
            gap: 8px;
        }

        .batch-footer .btn-apply {
            padding: 8px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .batch-footer .btn-apply:hover {
            opacity: 0.9;
        }

        .batch-footer .btn-apply:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .batch-footer .btn-cancel {
            padding: 8px 16px;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .batch-body {
                flex-direction: column;
            }

            .batch-left {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                padding-right: 0;
                padding-bottom: 12px;
                max-height: 200px;
            }
        }
    </style>

    <!-- 配置弹窗容器 -->
    <div class="config-modal-overlay" id="configModal" onclick="closeConfigModal(event)">
        <div class="config-modal" onclick="event.stopPropagation()">
            <div class="config-modal-header">
                <span class="config-modal-title" id="configModalTitle">⚙️ 任务配置</span>
                <button class="config-modal-close" onclick="closeConfigModal()">✕</button>
            </div>
            <div class="config-modal-body" id="configModalBody"></div>
        </div>
    </div>

    <!-- 全局任务开关弹窗 -->
    <div class="config-modal-overlay" id="globalSwitchModal" onclick="closeGlobalSwitchModal(event)">
        <div class="config-modal" onclick="event.stopPropagation()">
            <div class="config-modal-header">
                <span class="config-modal-title">🌐 全局任务开关</span>
                <button class="config-modal-close" onclick="closeGlobalSwitchModal()">✕</button>
            </div>
            <div class="config-modal-body" id="globalSwitchBody"></div>
        </div>
    </div>

    <!-- 批量设置弹窗 -->
    <div class="config-modal-overlay" id="batchConfigModal" onclick="closeBatchConfigModal(event)">
        <div class="config-modal batch-modal" onclick="event.stopPropagation()">
            <div class="config-modal-header">
                <span class="config-modal-title">⚙️ 批量设置账号配置</span>
                <button class="config-modal-close" onclick="closeBatchConfigModal()">✕</button>
            </div>
            <div class="batch-body">
                <div class="batch-left">
                    <input type="text" class="batch-search" placeholder="🔍 搜索账号..."
                        oninput="filterBatchAccounts(this.value)">
                    <div class="batch-select-all">
                        <input type="checkbox" id="batchSelectAll" onchange="toggleBatchSelectAll(this.checked)"
                            checked>
                        <label for="batchSelectAll">全选 (<span id="batchSelectedCount">0</span>/<span
                                id="batchTotalCount">0</span>)</label>
                    </div>
                    <div class="batch-account-list" id="batchAccountList"></div>
                </div>
                <div class="batch-right" id="batchConfigBody"></div>
            </div>
            <div class="batch-footer">
                <div class="batch-count">已选 <strong id="batchSelectedCount2">0</strong> 个账号</div>
                <div class="btn-group">
                    <button class="btn-cancel" onclick="closeBatchConfigModal()">取消</button>
                    <button class="btn-apply" id="batchApplyBtn" onclick="applyBatchConfig()">应用到选中账号</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 一键补差进度弹窗 ===== -->
    <div class="config-modal-overlay" id="autoRepairModal">
        <div class="config-modal" style="max-width:520px;width:95vw;" onclick="event.stopPropagation()">
            <div class="config-modal-header" style="background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);">
                <span class="config-modal-title" id="autoRepairTitle">⚡ 一键补差</span>
                <button class="config-modal-close" id="autoRepairCloseBtn" onclick="closeAutoRepairModal()">✕</button>
            </div>
            <div class="config-modal-body">
                <div id="autoRepairList" style="display:flex;flex-direction:column;gap:8px;"></div>
                <div style="margin-top:16px;">
                    <div
                        style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px;">
                        <span>总进度</span>
                        <span id="autoRepairProgressText">0 / 0</span>
                    </div>
                    <div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;">
                        <div id="autoRepairProgressBar"
                            style="height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:4px;transition:width 0.3s;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* ===== 一键补差弹窗样式 ===== */
        .repair-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
        }

        .repair-item-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .repair-item-name {
            font-weight: 600;
            color: #1e293b;
        }

        .repair-item-score {
            font-size: 11px;
            color: #64748b;
        }

        .repair-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .repair-badge.waiting {
            background: #f1f5f9;
            color: #64748b;
        }

        .repair-badge.running {
            background: #fef3c7;
            color: #d97706;
        }

        .repair-badge.success {
            background: #d1fae5;
            color: #059669;
        }

        .repair-badge.skip {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .repair-badge.error {
            background: #fee2e2;
            color: #dc2626;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin-icon {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
    </style>

    <script>
        // ==================== API配置 ====================
        function getApiBase() {
            if (typeof window.API_BASE_URL !== 'undefined') return window.API_BASE_URL;
            const hostname = window.location.hostname;
            const port = window.location.port;
            if (port === '8080') return `http://${hostname}:3000`;
            return `http://${hostname}:3000`;
        }
        const API_BASE = getApiBase();

        let currentConfig = null, globalConfig = null, statusData = {}, tokens = [], countdowns = {}, expandedAccount = null;
        let autoLogInterval = null, autoHangupInterval = null, isAutoLog = false, isAutoHangup = false;
        let schedulerPaused = false;

        // ===== 一键补差功能 =====
        function closeAutoRepairModal() {
            const closeBtn = document.getElementById('autoRepairCloseBtn');
            if (closeBtn && closeBtn.disabled) return; // 执行中不允许关闭
            document.getElementById('autoRepairModal').classList.remove('show');
        }

        async function runDailyTaskForLowActive() {
            // 1. 找出活跃度 < 70 的账号
            const lowActiveAccounts = tokens.filter(t => {
                const dp = statusData[t.name]?.dailyTask?.dailyPoint;
                return dp === undefined || dp < 70;
            });

            if (lowActiveAccounts.length === 0) {
                alert('✅ 所有账号每日活跃度均已达标（≥70），无需补差！');
                return;
            }

            // 2. 构建弹窗账号列表
            const list = document.getElementById('autoRepairList');
            list.innerHTML = lowActiveAccounts.map((t, i) => {
                const dp = statusData[t.name]?.dailyTask?.dailyPoint ?? '?';
                return `<div class="repair-item" id="repair-item-${i}">
                    <div class="repair-item-left">
                        <span class="repair-item-name">${t.name}</span>
                        <span class="repair-item-score">活跃度：${dp}/110</span>
                    </div>
                    <span class="repair-badge waiting" id="repair-badge-${i}">⏳ 等待中</span>
                </div>`;
            }).join('');

            document.getElementById('autoRepairTitle').textContent = `⚡ 一键补差 — 共 ${lowActiveAccounts.length} 个账号`;
            document.getElementById('autoRepairProgressText').textContent = `0 / ${lowActiveAccounts.length}`;
            document.getElementById('autoRepairProgressBar').style.width = '0%';
            document.getElementById('autoRepairCloseBtn').disabled = true;
            document.getElementById('autoRepairModal').classList.add('show');

            const btn = document.getElementById('autoRepairBtn');
            if (btn) { btn.disabled = true; btn.textContent = '⏳ 执行中...'; }

            // 3. 逐个串行执行
            let doneCount = 0;
            for (let i = 0; i < lowActiveAccounts.length; i++) {
                const account = lowActiveAccounts[i];
                const badge = document.getElementById(`repair-badge-${i}`);

                // 更新为执行中
                badge.className = 'repair-badge running';
                badge.innerHTML = '<span class="spin-icon">⚙️</span> 执行中';

                try {
                    // 启动任务
                    const startRes = await fetch(`${API_BASE}/api/run-task`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ accountName: account.name, taskName: '每日任务' })
                    });
                    const startData = await startRes.json();

                    if (!startData.success) {
                        badge.className = 'repair-badge error';
                        badge.textContent = '❌ 启动失败';
                        doneCount++;
                        continue;
                    }

                    // 轮询状态（每2秒，最多等15分钟）
                    const jobId = startData.jobId;
                    const maxPolls = 450; // 450 × 2s = 15分钟
                    let pollCount = 0;
                    let finalStatus = 'error';

                    while (pollCount < maxPolls) {
                        await new Promise(r => setTimeout(r, 2000));
                        pollCount++;
                        try {
                            const statusRes = await fetch(`${API_BASE}/api/run-task/status?jobId=${jobId}`);
                            const statusData2 = await statusRes.json();
                            if (statusData2.status === 'done') {
                                finalStatus = 'success'; break;
                            } else if (statusData2.status === 'error') {
                                // 退出码2 = 跳过（视为成功）
                                finalStatus = statusData2.exitCode === 2 ? 'skip' : 'error';
                                break;
                            }
                        } catch (e) { /* 网络抖动，继续轮询 */ }
                    }

                    if (finalStatus === 'success') {
                        badge.className = 'repair-badge success';
                        badge.textContent = '✅ 完成';
                    } else if (finalStatus === 'skip') {
                        badge.className = 'repair-badge skip';
                        badge.textContent = '⏭️ 跳过';
                    } else {
                        badge.className = 'repair-badge error';
                        badge.textContent = pollCount >= maxPolls ? '⏰ 超时' : '❌ 失败';
                    }

                } catch (e) {
                    badge.className = 'repair-badge error';
                    badge.textContent = '❌ 错误';
                }

                // 更新进度条
                doneCount++;
                const pct = Math.round((doneCount / lowActiveAccounts.length) * 100);
                document.getElementById('autoRepairProgressBar').style.width = pct + '%';
                document.getElementById('autoRepairProgressText').textContent = `${doneCount} / ${lowActiveAccounts.length}`;
            }

            // 4. 全部完成
            document.getElementById('autoRepairCloseBtn').disabled = false;
            if (btn) { btn.disabled = false; btn.textContent = '⚡ 一键补差'; }

            // 5. 延迟3秒刷新状态数据
            setTimeout(() => loadStatusData(), 3000);
        }

        // ===== 调度器控制功能 =====
        async function getSchedulerStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/scheduler/status`);
                const data = await res.json();
                if (data.success) {
                    schedulerPaused = data.paused || false;
                    updateSchedulerUI();
                }
            } catch (error) {
                console.error('获取调度器状态失败:', error);
            }
        }

        async function toggleScheduler() {
            const btn = document.getElementById('schedulerBtn');
            btn.disabled = true;
            try {
                const url = schedulerPaused ? `${API_BASE}/api/scheduler/resume` : `${API_BASE}/api/scheduler/pause`;
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    schedulerPaused = data.paused;
                    updateSchedulerUI();
                } else {
                    alert('操作失败: ' + data.message);
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        function updateSchedulerUI() {
            const btn = document.getElementById('schedulerBtn');
            if (schedulerPaused) {
                btn.textContent = '⏸️ 已暂停';
                btn.classList.add('danger');
            } else {
                btn.textContent = '▶️ 运行中';
                btn.classList.remove('danger');
            }
        }

        async function restartScheduler() {
            if (!confirm('确定要重启调度器吗？当前正在执行的任务会被中断。')) return;
            const btn = document.getElementById('restartBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 重启中...';
            try {
                const res = await fetch(`${API_BASE}/api/scheduler/restart`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert('调度器重启成功！');
                    setTimeout(() => getSchedulerStatus(), 2000);
                } else {
                    alert('重启失败: ' + data.message);
                }
            } catch (error) {
                alert('重启失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 重启调度器';
            }
        }

        // 页面切换
        function showPage(page, updateHash = true) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => {
                if (n.getAttribute('onclick')?.includes(`'${page}'`)) n.classList.add('active');
            });
            if (updateHash) window.location.hash = page;
            if (page === 'tools') document.body.style.overflow = 'hidden';
            else document.body.style.overflow = '';
            if (page === 'status') loadStatusData();
            else if (page === 'bin') loadBinFiles();
            else if (page === 'logs') loadLogs();
            else if (page === 'hangup') loadHangupData();
        }

        // 活动周计算
        const 活动类型 = { 0: '黑市周', 1: '招募周', 2: '宝箱周' };
        const 基准时间 = new Date('2025-11-21 12:00:00').getTime();
        function 计算活动周开始时间(now) {
            const d = new Date(now), w = d.getDay();
            const fri = new Date(d); fri.setDate(d.getDate() + (w < 5 ? 5 - w : w === 5 ? 0 : 12 - w));
            fri.setHours(12, 0, 0, 0);
            if (d.getTime() < fri.getTime()) fri.setDate(fri.getDate() - 7);
            return fri.getTime();
        }
        function 获取当前活动周类型() {
            const start = 计算活动周开始时间(new Date());
            const idx = Math.floor((start - 基准时间) / 604800000) % 3;
            return 活动类型[idx >= 0 ? idx : idx + 3];
        }
        function formatShortTime(s) {
            if (!s || s <= 0) return '-';
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                if (h > 0) return `${h}h${m}m`;
                if (m > 0) return `${m}m${sec}s`;
                return `${sec}s`;
            }
            if (h > 0) return `${h}小时${m}分${sec}秒`;
            if (m > 0) return `${m}分${sec}秒`;
            return `${sec}秒`;
        }

        // 加载数据
        async function loadStatusData() {
            try {
                const t = Date.now();
                try { await fetch(`${API_BASE}/api/sync-accounts`, { method: 'POST' }); } catch (e) { }
                const tokensRes = await fetch(`/data/tokens.json?t=${t}`);
                if (!tokensRes.ok) throw new Error('未找到tokens.json');
                tokens = await tokensRes.json();
                try { const r = await fetch(`/data/account-status.json?t=${t}`); if (r.ok) statusData = await r.json(); } catch (e) { }
                try {
                    const r = await fetch(`/data/task-config.json?t=${t}`); if (r.ok) {
                        const fullConfig = await r.json();
                        currentConfig = fullConfig.账号配置 || {};
                        globalConfig = fullConfig.全局设置 || {};
                    }
                } catch (e) { }

                let scheduleData = {};
                try { const r = await fetch(`/data/task-schedule-record.json?t=${t}`); if (r.ok) scheduleData = await r.json(); } catch (e) { }
                if (scheduleData.BOSS战斗?.accounts) {
                    Object.keys(statusData).forEach(accountName => {
                        const scheduleRecord = scheduleData.BOSS战斗.accounts[accountName];
                        if (scheduleRecord && scheduleRecord.lastStatus === 'success') {
                            if (!statusData[accountName].BOSS战斗) statusData[accountName].BOSS战斗 = {};
                            statusData[accountName].BOSS战斗.状态 = 'success';
                        }
                    });
                }

                Object.keys(countdowns).forEach(k => { if (countdowns[k]) { clearInterval(countdowns[k]); delete countdowns[k]; } });
                renderStatusTable();
                document.getElementById('totalAccounts').textContent = tokens.length;
                document.getElementById('withStatus').textContent = Object.keys(statusData).length;
            } catch (e) {
                document.getElementById('statusTableBody').innerHTML = `<tr><td colspan="6"><div class="no-data"><div class="no-data-icon">❌</div><div class="no-data-text">${e.message}</div></div></td></tr>`;
            }
        }

        function renderStatusTable() {
            const tbody = document.getElementById('statusTableBody');
            if (!tokens.length) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="no-data"><div class="no-data-icon">📭</div><div class="no-data-text">暂无账号</div></div></td></tr>`;
                return;
            }
            let html = '';
            tokens.forEach(t => {
                html += renderAccountRow(t.name, statusData[t.name]);
                html += renderDetailRow(t.name, statusData[t.name]);
            });
            tbody.innerHTML = html;
            tokens.forEach(t => { if (statusData[t.name]) startCountdown(t.name, statusData[t.name]); });
            if (expandedAccount) {
                const dr = document.getElementById(`detail-row-${expandedAccount}`);
                const row = document.getElementById(`data-row-${expandedAccount}`);
                if (dr) dr.classList.add('show');
                if (row) row.classList.add('expanded');
            }
        }

        function renderAccountRow(name, status) {
            const now = Date.now() / 1000;
            const dp = status?.dailyTask?.dailyPoint || 0;
            const percentage = Math.min(100, (dp / 110) * 100);
            let progressClass = 'low';
            if (percentage >= 100) progressClass = 'complete';
            else if (percentage >= 70) progressClass = 'high';
            else if (percentage >= 40) progressClass = 'medium';

            const dailyCell = `<div class="progress-container"><div class="progress-bar ${progressClass}" style="width: ${percentage}%"></div><div class="progress-text">${dp}/110</div></div>`;

            const bottleHelper = status?.bottleHelper;
            let bottleCell = '<span class="badge gray">未启动</span>';
            if (bottleHelper) {
                const hst = bottleHelper.helperStopTime || 0;
                const isRunning = bottleHelper.isRunning || (hst > now);
                if (isRunning && hst > now) {
                    const timeStr = formatShortTime(Math.floor(hst - now));
                    const isMobile = window.innerWidth <= 768;
                    bottleCell = `<span class="time-cell">🟢${isMobile ? '' : '剩余'}<span id="bottle-${name}">${timeStr}</span></span>`;
                } else {
                    bottleCell = '<span class="badge gray">已停止</span>';
                }
            }

            const hangUp = status?.hangUp;
            let hangUpCell = '<span class="badge gray">未挂机</span>';
            if (hangUp && hangUp.lastTime > 0) {
                const lastTime = hangUp.lastTime, hangUpTime = hangUp.hangUpTime || 0;
                const elapsedTime = Math.floor(now - lastTime);
                if (hangUpTime > 0) {
                    const remainingTime = Math.max(0, Math.floor(hangUpTime - (now - lastTime)));
                    const isMobile = window.innerWidth <= 768;
                    hangUpCell = remainingTime > 0 ? `<span class="time-cell">🟢${isMobile ? '' : '已挂'}<span id="hangup-${name}">${formatShortTime(elapsedTime)}</span></span>` : '<span class="badge warning">已完成</span>';
                } else {
                    const isMobile = window.innerWidth <= 768;
                    hangUpCell = `<span class="time-cell">🟢${isMobile ? '' : '已挂'}<span id="hangup-${name}">${formatShortTime(elapsedTime)}</span></span>`;
                }
            }

            const as = status?.arena?.status || 'pending', asc = status?.arena?.successCount || 0;
            let arenaBadge = '<span class="badge gray">-</span>';
            if (as === 'success') arenaBadge = `<span class="badge success">${asc}/3✓</span>`;
            else if (as === 'partial') arenaBadge = `<span class="badge warning">${asc}/3</span>`;
            else if (as === 'failed') arenaBadge = `<span class="badge danger">${asc}/3</span>`;

            return `<tr id="data-row-${name}" class="${expandedAccount === name ? 'expanded' : ''}">
                <td class="account-name-cell" onclick="toggleDetail('${name}')"><span class="expand-icon ${expandedAccount === name ? 'open' : ''}">▶</span>${name}</td>
                <td>${dailyCell}</td><td>${bottleCell}</td><td>${hangUpCell}</td><td>${arenaBadge}</td>
                <td>
                    <button class="action-btn settings" onclick="openConfigModal('${name}')" title="配置">⚙️</button>
                    <button class="action-btn ${(currentConfig?.[name]?.启用 !== false) ? 'enabled' : 'disabled'}" onclick="toggleAccountEnabled('${name}')" title="${(currentConfig?.[name]?.启用 !== false) ? '已启用' : '已禁用'}">
                        ${(currentConfig?.[name]?.启用 !== false) ? '✅' : '⛔'}
                    </button>
                </td>
            </tr>`;
        }

        // 详情面板 - 分组布局（用户自定义分组）
        function renderDetailRow(name, status) {
            const awt = 获取当前活动周类型();
            const 今天周几 = new Date().getDay();
            const 是宝库开放日 = (今天周几 !== 1 && 今天周几 !== 2);

            // === 每日任务 ===
            // 俱乐部签到
            let signinBadge = '<span class="badge-sm gray">未签</span>';
            if (status?.signin?.isSignedIn) {
                signinBadge = '<span class="badge-sm success">已签</span>';
            }

            // 每日咸王
            let kingBadge = '<span class="badge-sm gray">未执行</span>';
            if (status?.每日咸王?.状态 === 'success') {
                kingBadge = '<span class="badge-sm success">已完成</span>';
            } else if (status?.每日咸王?.状态 === 'failed') {
                kingBadge = '<span class="badge-sm danger">失败</span>';
            } else if (status?.每日咸王?.状态 === 'pending') {
                kingBadge = '<span class="badge-sm info">待执行</span>';
            }

            // 灯神
            let genieBadge = '<span class="badge-sm gray">未执行</span>';
            if (status?.灯神?.状态 === 'success') {
                genieBadge = '<span class="badge-sm success">已完成</span>';
            } else if (status?.灯神?.状态 === 'failed') {
                genieBadge = '<span class="badge-sm danger">失败</span>';
            } else if (status?.灯神?.状态 === 'pending') {
                genieBadge = '<span class="badge-sm info">待执行</span>';
            }

            // BOSS战斗
            let bossBadge = '<span class="badge-sm gray">未执行</span>';
            if (status?.BOSS战斗?.状态 === 'success') {
                bossBadge = '<span class="badge-sm success">已完成</span>';
            } else if (status?.BOSS战斗?.状态 === 'failed') {
                bossBadge = '<span class="badge-sm danger">失败</span>';
            } else if (status?.BOSS战斗?.状态 === 'pending') {
                bossBadge = '<span class="badge-sm info">待执行</span>';
            }

            // 竞技场
            let arenaBadge = '<span class="badge-sm gray">未执行</span>';
            if (status?.arena) {
                const sc = status.arena.successCount || 0;
                const st = status.arena.status;
                if (st === 'success') {
                    arenaBadge = `<span class="badge-sm success">${sc}/3胜</span>`;
                } else if (st === 'partial') {
                    arenaBadge = `<span class="badge-sm warning">${sc}/3胜</span>`;
                } else if (st === 'failed') {
                    arenaBadge = `<span class="badge-sm danger">${sc}/3败</span>`;
                } else if (st === 'pending') {
                    arenaBadge = '<span class="badge-sm info">待执行</span>';
                }
            }

            // === 每周任务 ===
            // 咸鱼大冲关（答题）
            let studyBadge = '<span class="badge-sm gray">未答题</span>';
            if (status?.study?.hasAnswered) {
                const score = status.study.score || 0;
                studyBadge = score >= 10
                    ? `<span class="badge-sm success">${score}分✓</span>`
                    : `<span class="badge-sm warning">${score}分</span>`;
            }

            // 梦境
            let dreamBadge = '<span class="badge-sm gray">未执行</span>';
            if (status?.梦境?.状态 === 'success') {
                dreamBadge = '<span class="badge-sm success">已完成</span>';
            } else if (status?.梦境?.状态 === 'failed') {
                dreamBadge = '<span class="badge-sm danger">失败</span>';

        let _globalSwitchQueue = Promise.resolve();
        function _queueGlobalSave(fn) {
            _globalSwitchQueue = _globalSwitchQueue.then(fn).catch(e => console.error('全局开关保存失败:', e));
            return _globalSwitchQueue;
        }


        async function toggleGlobalMode(checked) {
            return _queueGlobalSave(async () => {
                try {
                    const r = await fetch(`/data/task-config.json?t=${Date.now()}`);
                    let fullConfig = r.ok ? await r.json() : {};
                    if (!fullConfig.全局设置) fullConfig.全局设置 = {};
                    fullConfig.全局设置.启用全局模式 = checked;
                    globalConfig = fullConfig.全局设置;

                    const saveRes = await fetch(`${API_BASE}/api/save-config`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullConfig)
                    });
                    const result = await saveRes.json();
                    if (result.success) {
                        document.getElementById('globalSwitchBody').innerHTML = renderGlobalSwitchContent();
                        const status = document.getElementById('saveStatus');
                        status.textContent = checked ? '✓ 全局模式已开启' : '✓ 全局模式已关闭';
                        status.classList.add('show');
                        setTimeout(() => status.classList.remove('show'), 2000);
                    } else {
                        alert('保存失败: ' + result.message);
                    }
                } catch (e) {
                    alert('保存失败: ' + e.message);
                }
            });
        }

        async function toggleGlobalSwitch(task, key, checked) {
            return _queueGlobalSave(async () => {

                    if (!fullConfig.全局设置) fullConfig.全局设置 = {};

                    if (key) {

                        if (typeof fullConfig.全局设置.任务开关[task] !== 'object' || fullConfig.全局设置.任务开关[task] === null) {
                            fullConfig.全局设置.任务开关[task] = {};
                        }
                        fullConfig.全局设置.任务开关[task][key] = checked;
                    } else {
                        // key === null 表示任务顶层启用开关（直接布尔值，scheduler 读取此值）
                        fullConfig.全局设置.任务开关[task] = checked;
                    }
                    globalConfig = fullConfig.全局设置;

                    const saveRes = await fetch(`${API_BASE}/api/save-config`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullConfig)
                    });
                    const result = await saveRes.json();

                        status.textContent = `✓ ${label} 已${checked ? '开启' : '关闭'}`;

        // 深度合并：将 src 中的每个字段覆盖到 target
        function deepMerge(target, src) {
            for (const key of Object.keys(src)) {
                if (src[key] !== null && typeof src[key] === 'object' && !Array.isArray(src[key])) {
                    if (!target[key] || typeof target[key] !== 'object') target[key] = {};
                    deepMerge(target[key], src[key]);
                } else {
                    target[key] = src[key];
                }
            }
            return target;
        }

                const r = await fetch(`/data/task-config.json?t=${Date.now()}`);
                let fullConfig = r.ok ? await r.json() : {};
                if (!fullConfig.账号配置) fullConfig.账号配置 = {};

                // 只收集被用户修改过的字段
                const modifiedData = {};
                for (const mk of batchModifiedKeys) {
                    if (mk.includes('.')) {
                        // 嵌套字段：如 '竞技场.竞技场阵容'
                        const [task, key] = mk.split('.');
                        if (!modifiedData[task]) modifiedData[task] = {};
                        modifiedData[task][key] = batchTemplate[task]?.[key];
                    } else {
                        // 顶层字段：如 '疯狂赛车'
                        modifiedData[mk] = batchTemplate[mk];
                    }
                }

                // 将修改合并到每个选中账号
                selected.forEach(name => {
                    if (!fullConfig.账号配置[name]) fullConfig.账号配置[name] = { 启用: true };

                    for (const key of Object.keys(modifiedData)) {
                        if (modifiedData[key] !== null && typeof modifiedData[key] === 'object') {
                            // 嵌套对象合并（如 竞技场: { 竞技场阵容: 3 }）
                            if (!fullConfig.账号配置[name][key] || typeof fullConfig.账号配置[name][key] !== 'object') {
                                fullConfig.账号配置[name][key] = {};
                            }
                            deepMerge(fullConfig.账号配置[name][key], modifiedData[key]);
                        } else {
                            // 简单任务开关（如 疯狂赛车: true）
                            if (!fullConfig.账号配置[name][key] || typeof fullConfig.账号配置[name][key] !== 'object') {
                                fullConfig.账号配置[name][key] = {};
                            }
                            fullConfig.账号配置[name][key].启用 = modifiedData[key];
                        }
                    }
                });

                // 一次性保存
                const saveRes = await fetch(`${API_BASE}/api/save-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullConfig)
                });
                const result = await saveRes.json();
                if (result.success) {
                    currentConfig = fullConfig.账号配置;
                    closeBatchConfigModal();
                    const modCount = batchModifiedKeys.size;
                    const status = document.getElementById('saveStatus');
                    status.textContent = `✓ 已批量更新 ${selected.length} 个账号（${modCount} 项配置）`;
                    status.classList.add('show');
                    setTimeout(() => status.classList.remove('show'), 3000);
                    loadStatusData(); // 刷新页面
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '应用到选中账号';
            }
        }
        // ======================================================


        // 交互函数
        function toggleDetail(name) {
            const detailRow = document.getElementById(`detail-row-${name}`);
            const dataRow = document.getElementById(`data-row-${name}`);
            const expandIcon = dataRow.querySelector('.expand-icon');

            if (expandedAccount === name) {
                expandedAccount = null;
                detailRow.classList.remove('show');
                dataRow.classList.remove('expanded');
                expandIcon.classList.remove('open');
            } else {
                if (expandedAccount) {
                    document.getElementById(`detail-row-${expandedAccount}`)?.classList.remove('show');
                    const prevData = document.getElementById(`data-row-${expandedAccount}`);
                    prevData?.classList.remove('expanded');
                    prevData?.querySelector('.expand-icon')?.classList.remove('open');
                }
                expandedAccount = name;
                detailRow.classList.add('show');
                dataRow.classList.add('expanded');
                expandIcon.classList.add('open');
            }
        }

        function openTools(name) {
            showPage('tools');
            document.getElementById('toolsFrame').src = 'tools.html?account=' + encodeURIComponent(name);
        }

        // 切换账号启用状态
        function toggleAccountEnabled(name) {
            if (!currentConfig) currentConfig = {};
            if (!currentConfig[name]) currentConfig[name] = {};
            const newValue = currentConfig[name].启用 === false ? true : false;
            currentConfig[name].启用 = newValue;
            autoSaveConfig(name);
            renderStatusTable();
        }

        function updateNestedConfig(name, taskName, key, value) {
            if (!currentConfig) currentConfig = {};
            if (!currentConfig[name]) currentConfig[name] = {};
            if (key === null) {
                currentConfig[name][taskName] = value;
            } else {
                if (!currentConfig[name][taskName]) currentConfig[name][taskName] = {};
                currentConfig[name][taskName][key] = value;
            }
            autoSaveConfig(name);
        }

        let saveTimers = {};
        function autoSaveConfig(name) {
            if (saveTimers[name]) clearTimeout(saveTimers[name]);
            saveTimers[name] = setTimeout(() => saveAccountConfig(name), 500);
        }

        function adjustNum(name, task, key, delta) {
            const ranges = { '竞技场阵容': [1, 5], '战斗次数': [1, 10], 'BOSS阵容': [1, 5], '梦境阵容': [1, 5], '爬塔阵容': [1, 5], '最大小鱼干数': [1, 50] };
            const [min, max] = ranges[key] || [1, 10];
            const current = currentConfig?.[name]?.[task]?.[key] || (key === '最大小鱼干数' ? 10 : key === '战斗次数' ? 3 : 1);
            const newVal = Math.max(min, Math.min(max, current + delta));
            updateNestedConfig(name, task, key, newVal);
            // 刷新弹窗内容
            if (currentConfigAccount === name) {
                document.getElementById('configModalBody').innerHTML = renderConfigContent(name);
            }
        }

        async function saveAccountConfig(name) {
            try {
                const response = await fetch(`/data/task-config.json?t=${Date.now()}`);
                let fullConfig = response.ok ? await response.json() : {};
                if (!fullConfig.账号配置) fullConfig.账号配置 = {};
                fullConfig.账号配置[name] = currentConfig[name];
                const saveRes = await fetch(`${API_BASE}/api/save-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullConfig)
                });
                const result = await saveRes.json();
                if (result.success) {
                    const status = document.getElementById('saveStatus');
                    status.classList.add('show');
                    setTimeout(() => status.classList.remove('show'), 2000);
                }
            } catch (e) { console.error('保存失败:', e); }
        }

        function startCountdown(name, status) {
            const now = Date.now() / 1000;
            const bottleHelper = status?.bottleHelper;
            if (bottleHelper) {
                const hst = bottleHelper.helperStopTime || 0;
                if ((bottleHelper.isRunning || hst > now) && hst > now) {
                    countdowns[`bottle-${name}`] = setInterval(() => {
                        const elem = document.getElementById(`bottle-${name}`);
                        if (elem) {
                            const remaining = Math.floor(hst - Date.now() / 1000);
                            if (remaining > 0) elem.textContent = formatShortTime(remaining);
                            else {
                                elem.parentElement.innerHTML = '<span class="badge gray">已停止</span>';
                                clearInterval(countdowns[`bottle-${name}`]);
                            }
                        } else clearInterval(countdowns[`bottle-${name}`]);
                    }, 1000);
                }
            }
            const hangUp = status?.hangUp;
            if (hangUp && hangUp.lastTime > 0) {
                const lastTime = hangUp.lastTime, hangUpTime = hangUp.hangUpTime || 0;
                countdowns[`hangup-${name}`] = setInterval(() => {
                    const elem = document.getElementById(`hangup-${name}`);
                    if (elem) {
                        const currentTime = Date.now() / 1000;
                        const elapsedTime = Math.floor(currentTime - lastTime);
                        if (hangUpTime > 0) {
                            const remainingTime = Math.floor(hangUpTime - (currentTime - lastTime));
                            if (remainingTime > 0) elem.textContent = formatShortTime(elapsedTime);
                            else {
                                elem.parentElement.innerHTML = '<span class="badge warning">已完成</span>';
                                clearInterval(countdowns[`hangup-${name}`]);
                            }
                        } else elem.textContent = formatShortTime(elapsedTime);
                    } else clearInterval(countdowns[`hangup-${name}`]);
                }, 1000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 从 URL hash 恢复页面状态
            const hash = window.location.hash.replace('#', '');
            const validPages = ['status', 'tools', 'bin', 'logs', 'hangup'];
            if (hash && validPages.includes(hash)) {
                showPage(hash, false);
            } else {
                loadStatusData();
            }

            // 文件上传事件
            document.getElementById('uploadArea')?.addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput')?.addEventListener('change', handleFileUpload);

            // 拖拽上传
            const uploadArea = document.getElementById('uploadArea');
            if (uploadArea) {
                uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
                uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
                uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFileUpload({ target: { files: e.dataTransfer.files } }); });
            }
        });

        // 监听浏览器前进/后退
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            const validPages = ['status', 'tools', 'bin', 'logs', 'hangup'];
            if (hash && validPages.includes(hash)) showPage(hash, false);
        });

        // ==================== BIN管理页 ====================
        async function loadBinFiles() {
            try {
                const response = await fetch(`${API_BASE}/api/bin-files`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const container = document.getElementById('fileListContent');
                if (!data.success) { container.innerHTML = '<div class="no-data"><div class="no-data-icon">❌</div><div class="no-data-text">加载失败</div></div>'; return; }
                const files = data.files || [];
                if (!files.length) { container.innerHTML = '<div class="no-data"><div class="no-data-icon">📁</div><div class="no-data-text">暂无BIN文件</div></div>'; return; }

                let hangupConfig = {};
                try { const r = await fetch(`${API_BASE}/api/hangup-config`); const d = await r.json(); if (d.success) hangupConfig = d.config || {}; } catch (e) { }

                let html = '';
                files.forEach(file => {
                    const accountName = file.name.replace(/\.bin$/i, '');
                    const isEnabled = hangupConfig[accountName] === true;
                    html += `<div class="file-item">
                        <div class="file-info"><div class="file-name">${file.name}</div><div class="file-meta">大小: ${(file.size / 1024).toFixed(1)}KB | 创建时间: ${new Date(file.created).toLocaleString()}</div></div>
                        <div class="file-actions">
                            <span class="hangup-label">挂机:</span>
                            <label class="toggle-switch"><input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleHangup('${file.name}', this.checked)"><span class="slider"></span></label>
                            <button class="btn danger" onclick="deleteBinFile('${file.name}')">🗑️</button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (e) { document.getElementById('fileListContent').innerHTML = '<div class="no-data"><div class="no-data-icon">❌</div><div class="no-data-text">加载失败: ' + e.message + '</div></div>'; }
        }

        async function deleteBinFile(filename) {
            if (!confirm(`确定要删除 ${filename} 吗？`)) return;
            try {
                const response = await fetch(`${API_BASE}/api/delete-bin/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success) { alert(`✓ ${filename} 删除成功！`); setTimeout(() => loadBinFiles(), 1000); }
                else throw new Error(data.message || '删除失败');
            } catch (e) { alert('删除文件失败: ' + e.message); }
        }

        async function toggleHangup(filename, enabled) {
            try {
                const accountName = filename.replace(/\.bin$/i, '');
                const response = await fetch(`${API_BASE}/api/hangup-config/${encodeURIComponent(accountName)}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled })
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message || '操作失败');
            } catch (e) { alert('挂机设置失败: ' + e.message); event.target.checked = !enabled; }
        }

        async function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            for (const file of files) {
                if (!file.name.endsWith('.bin')) { alert(`${file.name} 不是BIN文件`); continue; }
                const formData = new FormData(); formData.append('file', file);
                try {
                    const response = await fetch(`${API_BASE}/api/upload-bin`, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.success) alert(`✓ ${file.name} 上传成功！`);
                    else throw new Error(data.message || '上传失败');
                } catch (e) { alert(`上传 ${file.name} 失败: ${e.message}`); }
            }
            setTimeout(() => loadBinFiles(), 1000);
            document.getElementById('fileInput').value = '';
        }

        // ==================== 日志页 ====================
        async function loadLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/logs`);
                const result = await response.json();
                const container = document.getElementById('logContainer');
                if (!result.success || !result.logs?.trim()) { container.innerHTML = '<div class="no-data"><div class="no-data-icon">📝</div><div class="no-data-text">暂无日志</div></div>'; return; }
                const lines = result.logs.split('\n').slice(-500);
                let html = '';
                lines.forEach(line => {
                    if (!line.trim()) return;
                    let className = 'log-line';
                    if (line.includes('[INFO]')) className += ' log-info';
                    else if (line.includes('[OK]')) className += ' log-ok';
                    else if (line.includes('[ERROR]')) className += ' log-error';
                    else if (line.includes('[WARN]')) className += ' log-warn';
                    html += `<div class="${className}">${line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (e) { document.getElementById('logContainer').innerHTML = '<div class="no-data"><div class="no-data-icon">❌</div><div class="no-data-text">加载日志失败</div></div>'; }
        }

        function toggleAutoLog() {
            const btn = document.getElementById('autoLogBtn');
            if (isAutoLog) { clearInterval(autoLogInterval); isAutoLog = false; btn.textContent = '🔄 自动刷新'; btn.classList.remove('success'); }
            else { autoLogInterval = setInterval(loadLogs, 3000); isAutoLog = true; btn.textContent = '⏸️ 停止刷新'; btn.classList.add('success'); loadLogs(); }
        }

        // ==================== 挂机日志页 ====================
        async function loadHangupData() {
            try {
                const [statusRes, logsRes] = await Promise.all([fetch(`${API_BASE}/api/hangup-status`), fetch(`${API_BASE}/api/hangup-logs`)]);
                const status = await statusRes.json();
                const logsResult = await logsRes.json();
                const logs = logsResult.logs || '';
                const stats = status.data?.stats || {};
                document.getElementById('hTotal').textContent = stats.total || 0;
                document.getElementById('hEnabled').textContent = stats.enabled || 0;
                document.getElementById('hOnline').textContent = stats.online || 0;
                document.getElementById('hOffline').textContent = stats.offline || 0;

                const logContainer = document.getElementById('hangupLogContainer');
                if (logs.trim()) {
                    const lines = logs.split('\n').slice(-100);
                    let html = '';
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        let className = 'log-line';
                        if (line.includes('上线')) className += ' log-ok';
                        else if (line.includes('离线') || line.includes('断开')) className += ' log-error';
                        else if (line.includes('连接')) className += ' log-info';
                        html += `<div class="${className}">${line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                    });
                    logContainer.innerHTML = html;
                    logContainer.scrollTop = logContainer.scrollHeight;
                } else { logContainer.innerHTML = '<div class="no-data">暂无挂机日志</div>'; }

                const grid = document.getElementById('hangupAccountGrid');
                const accounts = status.data?.accounts || [];
                if (accounts.length) {
                    let html = '';
                    accounts.forEach(acc => {
                        const cardClass = acc.hangupEnabled ? (acc.windowExists ? 'hangup-on' : 'hangup-off') : 'hangup-off';
                        const statusText = acc.windowExists ? '在线' : (acc.waitingLogin ? `等待${acc.waitingMinutes}分钟` : '离线');
                        const statusClass = acc.windowExists ? 'online' : (acc.waitingLogin ? 'waiting' : 'offline');
                        html += `<div class="account-card ${cardClass}">
                            <div class="account-card-name">${acc.accountName}</div>
                            <div class="account-card-status">
                                <div class="status-row"><span class="label">挂机状态:</span><span class="value">${acc.hangupEnabled ? '已启用' : '已禁用'}</span></div>
                                <div class="status-row"><span class="label">窗口状态:</span><span class="value ${statusClass}">${statusText}</span></div>
                                <div class="status-row"><span class="label">最后任务:</span><span class="value">${acc.lastTaskTime || '-'}</span></div>
                            </div>
                        </div>`;
                    });
                    grid.innerHTML = html;
                } else { grid.innerHTML = '<div class="no-data">暂无挂机账号</div>'; }
            } catch (e) { console.error('加载挂机数据失败:', e); }
        }

        function toggleAutoHangup() {
            const btn = document.getElementById('autoHangupBtn');
            if (isAutoHangup) { clearInterval(autoHangupInterval); isAutoHangup = false; btn.textContent = '🔄 自动刷新'; btn.classList.remove('success'); }
            else { autoHangupInterval = setInterval(loadHangupData, 5000); isAutoHangup = true; btn.textContent = '⏸️ 停止刷新'; btn.classList.add('success'); loadHangupData(); }
        }

        // 初始化获取调度器状态
        getSchedulerStatus();
    </script>
</body>
