<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOSS塔助战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 20px;
      min-height: calc(100vh - 40px);
    }

    .header {
      grid-column: 1 / -1;
      text-align: center;
      color: white;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* 左侧配置区 */
    .left-panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 右侧状态区 */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }

    /* 表单组 */
    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group select,
    .form-group input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* 小号选择区 */
    .scouts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    /* 大号卡片容器 */
    .masters-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    /* 大号卡片 */
    .master-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .master-card:hover {
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .master-card.selected {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .master-card-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .master-card-header input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }

    .master-card-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .master-card-formation {
      padding: 4px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      cursor: pointer;
    }

    .master-card-formation:focus {
      outline: none;
      border-color: #667eea;
    }

    .master-card-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .master-stat {
      text-align: center;
    }

    .master-stat-label {
      font-size: 10px;
      color: #999;
      margin-bottom: 2px;
    }

    .master-stat-value {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
    }

    .master-stat-value.success {
      color: #4ec9b0;
    }

    .master-stat-value.error {
      color: #f48771;
    }

    .master-stat-value.remain {
      color: #ce9178;
      /* 改成橙色，更清晰 */
    }

    .scout-checkbox {
      display: flex;
      align-items: center;
      padding: 8px;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .scout-checkbox:hover {
      background: #f0f0ff;
      transform: translateX(2px);
    }

    .scout-checkbox input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .scout-checkbox label {
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      margin: 0;
      flex: 1;
    }

    .scout-checkbox select {
      margin-left: 8px;
      padding: 2px 6px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 11px;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
    }

    .scout-checkbox select:focus {
      outline: none;
      border-color: #667eea;
    }

    /* 层数选择框 */
    .floor-checkbox {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }

    .floor-checkbox:hover {
      background: #f0f0ff;
    }

    .floor-checkbox input[type="checkbox"] {
      margin-right: 6px;
      cursor: pointer;
    }

    /* 层数过滤 */
    .floor-filter {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
    }

    .floor-range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* 按钮 */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #ff4757;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #ee5a6f;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 上传按钮 */
    .upload-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background: #5568d3;
    }

    /* 状态卡片 */
    .status-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .status-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      border-radius: 10px;
      color: white;
      text-align: center;
    }

    .status-card .label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .status-card .value {
      font-size: 24px;
      font-weight: 700;
    }

    /* 日志区域 */
    .log-panel {
      height: 500px;
      max-height: 500px;
      background: #1e1e1e;
      border-radius: 10px;
      padding: 15px;
      overflow-y: auto;
      overflow-x: hidden;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      color: #d4d4d4;
    }

    .log-line {
      padding: 3px 0;
      line-height: 1.5;
    }

    .log-line.info {
      color: #9cdcfe;
    }

    .log-line.success {
      color: #4ec9b0;
    }

    .log-line.warn {
      color: #dcdcaa;
    }

    .log-line.error {
      color: #f48771;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5568d3;
    }

    .log-panel::-webkit-scrollbar-track {
      background: #2d2d2d;
    }

    .log-panel::-webkit-scrollbar-thumb {
      background: #555;
    }

    /* 提示文本 */
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .upload-status {
      font-size: 12px;
      margin-left: 10px;
    }

    /* 竖屏/移动端响应式 */
    @media (max-width: 1100px) {
      body {
        padding: 10px;
      }

      .container {
        grid-template-columns: 1fr;
        min-height: auto;
        gap: 15px;
      }

      .header {
        font-size: 20px;
        margin-bottom: 5px;
      }

      .left-panel {
        gap: 15px;
        padding: 15px;
      }

      .status-cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .status-card {
        padding: 12px;
      }

      .status-card .value {
        font-size: 20px;
      }

      .log-panel {
        min-height: 300px;
        max-height: 400px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      🏰 BOSS塔助战
      <span style="font-size: 12px; font-weight: bold; color: #ff4d4f; -webkit-text-fill-color: #ff4d4f !important; margin-left: 10px; background: white; padding: 1px 8px; border-radius: 4px; border: 1px solid #ff4d4f; vertical-align: middle;">v2.00</span>
    </div>

    <!-- 左侧配置区 -->
    <div class="left-panel">
      <!-- 大号配置 -->
      <div>
        <div class="panel-title">大号配置 <span style="font-size: 12px; color: #999;">(可多选)</span></div>
        <div>
          <input type="file" id="master-bin-upload" accept=".bin" multiple style="display: none;"
            onchange="uploadMasterBins()">
          <button class="upload-btn" onclick="document.getElementById('master-bin-upload').click()">
            📤 上传大号BIN
          </button>
          <span id="master-upload-status" class="upload-status"></span>
        </div>
        <div class="masters-container" id="masters-grid" style="margin-top: 10px;">
          <div style="text-align: center; color: #999;">加载中...</div>
        </div>
        <div class="hint">
          <button onclick="selectAllMasters()"
            style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全选</button> |
          <button onclick="selectNoneMasters()"
            style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全不选</button>
        </div>
      </div>

      <!-- 小号配置 -->
      <div>
        <div class="panel-title">小号配置 <span style="font-size: 12px; color: #999;">(可多选)</span></div>
        <div>
          <input type="file" id="scout-bin-upload" accept=".bin" multiple style="display: none;"
            onchange="uploadScoutBins()">
          <button class="upload-btn" onclick="document.getElementById('scout-bin-upload').click()">
            📤 上传小号BIN
          </button>
          <span id="scout-upload-status" class="upload-status"></span>
        </div>
        <div class="scouts-grid" id="scouts-grid" style="margin-top: 10px;">
          <div style="grid-column: 1/-1; text-align: center; color: #999;">加载中...</div>
        </div>
        <div class="hint">
          <button onclick="selectAllScouts()"
            style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全选</button> |
          <button onclick="selectNoneScouts()"
            style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全不选</button> |
          <button onclick="initScouts()"
            style="border: none; background: none; color: #f59e0b; cursor: pointer; font-size: 12px; font-weight: 600;">🔧
            初始化BOSS塔权限</button>
        </div>
      </div>

      <!-- 层数过滤 -->
      <div>
        <div class="panel-title">层数过滤</div>
        <div class="floor-filter">
          <label class="checkbox-label">
            <input type="checkbox" id="floor-filter-enable">
            <span>启用层数过滤</span>
          </label>
          <div style="margin-top: 10px;">
            <div style="font-size: 13px; color: #666; margin-bottom: 8px;">选择要打的层数：</div>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;">
              <label class="floor-checkbox"><input type="checkbox" value="1" class="floor-item"> 1层</label>
              <label class="floor-checkbox"><input type="checkbox" value="2" class="floor-item"> 2层</label>
              <label class="floor-checkbox"><input type="checkbox" value="4" class="floor-item"> 4层</label>
              <label class="floor-checkbox"><input type="checkbox" value="5" class="floor-item"> 5层</label>
              <label class="floor-checkbox"><input type="checkbox" value="7" class="floor-item"> 7层</label>
              <label class="floor-checkbox"><input type="checkbox" value="8" class="floor-item"> 8层</label>
              <label class="floor-checkbox"><input type="checkbox" value="10" class="floor-item"> 10层</label>
              <label class="floor-checkbox"><input type="checkbox" value="11" class="floor-item"> 11层</label>
              <label class="floor-checkbox"><input type="checkbox" value="13" class="floor-item"> 13层</label>
              <label class="floor-checkbox"><input type="checkbox" value="14" class="floor-item"> 14层</label>
            </div>
          </div>
          <div class="hint" style="margin-top: 10px;">
            💡 跳过层：-1(已过关), 3/6/9/12(BOSS层), 15层
          </div>
          <div style="margin-top: 8px;">
            <button onclick="selectAllFloors()"
              style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全选</button> |
            <button onclick="selectNoneFloors()"
              style="border: none; background: none; color: #667eea; cursor: pointer; font-size: 12px;">全不选</button>
          </div>
        </div>
      </div>

      <!-- 控制按钮 -->
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-start" onclick="startAssist()">启动</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopAssist()" disabled>停止</button>
      </div>
    </div>

    <!-- 右侧状态和日志区 -->
    <div class="right-panel">
      <!-- 状态卡片 -->
      <div class="panel" style="padding: 15px;">
        <div class="status-cards">
          <div class="status-card">
            <div class="label">运行状态</div>
            <div class="value" id="status-running">停止</div>
          </div>
          <div class="status-card">
            <div class="label">当前大号</div>
            <div class="value" id="status-master" style="font-size: 14px;">离线</div>
          </div>
          <div class="status-card">
            <div class="label">剩余次数</div>
            <div class="value" id="status-remain">0</div>
          </div>
          <div class="status-card">
            <div class="label">小号在线</div>
            <div class="value" id="status-scouts">0/0</div>
          </div>
        </div>
      </div>

      <!-- 运行日志 -->
      <div class="panel" style="display: flex; flex-direction: column; min-height: 0;">
        <div class="panel-title">运行日志</div>
        <div class="log-panel" id="log-panel">
          <div class="log-line info">[系统] 等待启动...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let statusTimer = null;
    let logTimer = null;

    // 页面加载
    window.onload = async function () {
      await loadMasters();  // 先加载大号列表
      await loadScouts();   // 再加载小号列表
      await loadConfig();   // 最后加载配置（恢复勾选状态）
      startStatusPolling();

      // 检查是否正在运行，如果是则恢复日志轮询
      try {
        const resp = await fetch('/api/boss-assist/status');
        const status = await resp.json();
        if (status.running) {
          document.getElementById('btn-start').disabled = true;
          document.getElementById('btn-stop').disabled = false;
          startLogPolling();
        }
      } catch (e) {
        console.error('检查运行状态失败:', e);
      }
    };

    // 加载配置（恢复勾选状态）
    async function loadConfig() {
      try {
        const resp = await fetch('/api/boss-assist/config');
        const config = await resp.json();

        // 恢复大号选择和阵容配置
        if (config.大号?.选中列表) {
          config.大号.选中列表.forEach(masterName => {
            const checkbox = document.getElementById(`master-${masterName}`);
            if (checkbox) {
              checkbox.checked = true;
              toggleMasterCard(checkbox);
            }
          });
        }

        // 恢复大号阵容配置
        if (config.大号?.阵容配置) {
          for (const [masterName, formationId] of Object.entries(config.大号.阵容配置)) {
            const select = document.querySelector(`.master-formation[data-master="${masterName}"]`);
            if (select) {
              select.value = formationId;
            }
          }
        }

        // 恢复层数过滤配置
        if (config.层数过滤) {
          document.getElementById('floor-filter-enable').checked = config.层数过滤.启用 || false;

          // 恢复选中的层数
          if (config.层数过滤.允许层数 && Array.isArray(config.层数过滤.允许层数)) {
            config.层数过滤.允许层数.forEach(floor => {
              const checkbox = document.querySelector(`.floor-item[value="${floor}"]`);
              if (checkbox) checkbox.checked = true;
            });
          } else {
            // 默认全选
            document.querySelectorAll('.floor-item').forEach(cb => cb.checked = true);
          }
        } else {
          // 默认全选
          document.querySelectorAll('.floor-item').forEach(cb => cb.checked = true);
        }

        // 恢复小号选择配置
        if (config.小号?.选中列表) {
          config.小号.选中列表.forEach(scoutName => {
            const checkbox = document.getElementById(`scout-${scoutName}`);
            if (checkbox) {
              checkbox.checked = true;
            }
          });
        }
      } catch (e) {
        console.error('加载配置失败:', e);
      }
    }

    // 加载大号列表
    async function loadMasters() {
      try {
        const resp = await fetch('/api/boss-assist/masters');
        const masters = await resp.json();

        const grid = document.getElementById('masters-grid');
        if (masters.length === 0) {
          grid.innerHTML = '<div style="text-align: center; color: #999;">无大号BIN文件</div>';
        } else {
          grid.innerHTML = masters.map(m => {
            return `
              <div class="master-card" data-master="${m.name}">
                <div class="master-card-header">
                  <input type="checkbox" id="master-${m.name}" value="${m.name}" 
                         onchange="toggleMasterCard(this)" onclick="event.stopPropagation()">
                  <div class="master-card-name">${m.name}</div>
                  <select class="master-card-formation master-formation" data-master="${m.name}" 
                          onclick="event.stopPropagation()">
                    <option value="">默认</option>
                    <option value="1">阵容1</option>
                    <option value="2">阵容2</option>
                    <option value="3">阵容3</option>
                    <option value="4">阵容4</option>
                    <option value="5">阵容5</option>
                  </select>
                </div>
                <div class="master-card-stats">
                  <div class="master-stat">
                    <div class="master-stat-label">助战</div>
                    <div class="master-stat-value" id="master-${m.name}-total">0</div>
                  </div>
                  <div class="master-stat">
                    <div class="master-stat-label">成功</div>
                    <div class="master-stat-value success" id="master-${m.name}-success">0</div>
                  </div>
                  <div class="master-stat">
                    <div class="master-stat-label">失败</div>
                    <div class="master-stat-value error" id="master-${m.name}-fail">0</div>
                  </div>
                  <div class="master-stat">
                    <div class="master-stat-label">剩余</div>
                    <div class="master-stat-value remain" id="master-${m.name}-remain">-</div>
                  </div>
                </div>
              </div>
            `;
          }).join('');

          // 添加卡片点击事件
          document.querySelectorAll('.master-card').forEach(card => {
            card.addEventListener('click', function (e) {
              if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
                const checkbox = this.querySelector('input[type="checkbox"]');
                checkbox.checked = !checkbox.checked;
                toggleMasterCard(checkbox);
              }
            });
          });
        }
      } catch (e) {
        console.error('加载大号列表失败:', e);
      }
    }

    // 切换大号卡片选中状态
    function toggleMasterCard(checkbox) {
      const card = checkbox.closest('.master-card');
      if (checkbox.checked) {
        card.classList.add('selected');
      } else {
        card.classList.remove('selected');
      }
    }

    // 加载小号列表
    async function loadScouts() {
      try {
        const resp = await fetch('/api/boss-assist/scouts');
        const scouts = await resp.json();

        const grid = document.getElementById('scouts-grid');
        if (scouts.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #999;">无小号BIN文件</div>';
        } else {
          grid.innerHTML = scouts.map(s => {
            const checked = window.selectedScouts && window.selectedScouts.includes(s.name) ? 'checked' : '';
            return `
              <div class="scout-checkbox">
                <input type="checkbox" id="scout-${s.name}" value="${s.name}" ${checked}>
                <label for="scout-${s.name}">${s.name}</label>
              </div>
            `;
          }).join('');
        }
      } catch (e) {
        console.error('加载小号列表失败:', e);
      }
    }

    // 全选大号
    function selectAllMasters() {
      document.querySelectorAll('#masters-grid input[type="checkbox"]').forEach(cb => cb.checked = true);
    }

    // 全不选大号
    function selectNoneMasters() {
      document.querySelectorAll('#masters-grid input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    // 全选小号
    function selectAllScouts() {
      document.querySelectorAll('#scouts-grid input[type="checkbox"]').forEach(cb => cb.checked = true);
    }

    // 全不选小号
    function selectNoneScouts() {
      document.querySelectorAll('#scouts-grid input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    // 轮询定时器
    let initLogPollTimer = null;

    // 初始化小号BOSS塔权限
    async function initScouts() {
      if (!confirm('确定要为所有选中的小号初始化BOSS塔权限吗？\n\n这将为每个小号执行一次每日咸王任务，解锁BOSS塔推荐队伍功能。\n\n后端任务将异步执行，您可以关闭网页，任务不会中断。')) {
        return;
      }

      const btn = event.target || document.querySelector('button[onclick="initScouts()"]');
      const originalText = btn.textContent;

      try {
        btn.disabled = true;
        btn.textContent = '🚀 启动中...';

        const resp = await fetch('/api/boss-assist/init-scouts', { method: 'POST' });
        const result = await resp.json();

        if (result.success) {
          showInitLogModal();
          startInitLogPolling(btn, originalText);
        } else {
          alert('❌ 启动失败：' + (result.error || '未知错误'));
          btn.disabled = false;
          btn.textContent = originalText;
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = originalText;
        alert('❌ 请求失败：' + e.message);
        console.error(e);
      }
    }

    // 显示日志弹窗
    function showInitLogModal() {
      if (document.querySelector('.log-modal-overlay')) return;

      const div = document.createElement('div');
      div.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;";

      div.innerHTML = `
            <div style="background:white;padding:20px;border-radius:8px;width:700px;display:flex;flex-direction:column;box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h3 style="margin:0;">初始化运行日志 (实时)</h3>
                    <button onclick="closeInitLogModal()" style="border:none;background:none;font-size:20px;cursor:pointer;">&times;</button>
                </div>
                <div id="init-log-container" style="height:500px;overflow:auto;background:#1e1e1e;color:#d4d4d4;padding:15px;border-radius:4px;font-family:Consolas, monospace;white-space:pre-wrap;">正在连接日志流...</div>
                <div style="margin-top:15px;text-align:right;">
                    <span id="init-status-text" style="margin-right:10px;color:#666;">运行中...</span>
                    <button onclick="closeInitLogModal()" style="padding:8px 20px;background:#667eea;color:white;border:none;border-radius:4px;cursor:pointer;">后台运行/关闭</button>
                </div>
            </div>
        `;
      div.className = 'log-modal-overlay';
      document.body.appendChild(div);
    }

    function closeInitLogModal() {
      const el = document.querySelector('.log-modal-overlay');
      if (el) el.remove();
      // 关闭窗口时停止前端轮询，减少请求
      if (initLogPollTimer) clearInterval(initLogPollTimer);
    }

    function startInitLogPolling(btn, originalText) {
      if (initLogPollTimer) clearInterval(initLogPollTimer);

      const poll = async () => {
        try {
          const res = await fetch('/api/boss-assist/init-logs');
          const data = await res.json();

          const container = document.getElementById('init-log-container');
          const statusText = document.getElementById('init-status-text');

          // 更新日志内容
          if (data.logs && container) {
            const html = data.logs.map(l => `[${l.time}] ${l.type === 'error' ? '❌ ' : ''}${l.message}`).join('\n');
            if (container.innerHTML !== html) {
              container.innerHTML = html;
              container.scrollTop = container.scrollHeight;
            }
          }

          // 更新状态
          if (data.running === false) {
            clearInterval(initLogPollTimer);
            if (statusText) {
              statusText.textContent = "✅ 任务已结束";
              statusText.style.color = "green";
            }
            if (btn) {
              btn.disabled = false;
              btn.textContent = originalText;
            }
          } else {
            if (statusText) statusText.textContent = "⏳ 运行中...";
            if (btn) btn.textContent = '⏳ 运行中...';
          }

        } catch (e) { console.error(e); }
      };

      // 立即执行一次
      poll();
      initLogPollTimer = setInterval(poll, 1500);
    }

    // 全选层数
    function selectAllFloors() {
      document.querySelectorAll('.floor-item').forEach(cb => cb.checked = true);
    }

    // 全不选层数
    function selectNoneFloors() {
      document.querySelectorAll('.floor-item').forEach(cb => cb.checked = false);
    }

    // 获取选中的大号及其阵容配置
    function getSelectedMastersWithFormations() {
      const checkboxes = document.querySelectorAll('#masters-grid input[type="checkbox"]:checked');
      const masters = Array.from(checkboxes).map(cb => cb.value);

      const formations = {};
      document.querySelectorAll('.master-formation').forEach(select => {
        const masterName = select.getAttribute('data-master');
        const formationId = select.value;
        if (formationId) {
          formations[masterName] = parseInt(formationId);
        }
      });

      return { masters, formations };
    }

    // 获取选中的大号（兼容旧版）
    function getSelectedMasters() {
      const checkboxes = document.querySelectorAll('#masters-grid input[type="checkbox"]:checked');
      return Array.from(checkboxes).map(cb => cb.value);
    }

    // 获取选中的小号
    function getSelectedScouts() {
      const checkboxes = document.querySelectorAll('#scouts-grid input[type="checkbox"]:checked');
      return Array.from(checkboxes).map(cb => cb.value);
    }

    // 获取选中的层数
    function getSelectedFloors() {
      const checkboxes = document.querySelectorAll('.floor-item:checked');
      return Array.from(checkboxes).map(cb => parseInt(cb.value));
    }

    // 保存配置
    async function saveConfig() {
      const { masters, formations } = getSelectedMastersWithFormations();
      const selectedScouts = getSelectedScouts();
      const selectedFloors = getSelectedFloors();

      const config = {
        大号: {
          选中列表: masters,
          阵容配置: formations
        },
        小号: {
          选中列表: selectedScouts
        },
        层数过滤: {
          启用: document.getElementById('floor-filter-enable').checked,
          允许层数: selectedFloors
        }
      };

      try {
        await fetch('/api/boss-assist/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
      } catch (e) {
        console.error('保存配置失败:', e);
      }
    }

    // 上传大号BIN
    async function uploadMasterBins() {
      const fileInput = document.getElementById('master-bin-upload');
      const files = fileInput.files;

      if (files.length === 0) {
        alert('请先选择文件');
        return;
      }

      const statusEl = document.getElementById('master-upload-status');
      statusEl.textContent = '上传中...';
      statusEl.style.color = '#667eea';

      try {
        const formData = new FormData();
        formData.append('type', 'master');
        for (let i = 0; i < files.length; i++) {
          formData.append('binFile', files[i]);
        }

        const resp = await fetch('/api/boss-assist/upload-bin', {
          method: 'POST',
          body: formData
        });

        const result = await resp.json();

        if (result.success) {
          statusEl.textContent = `✓ 成功上传 ${result.count} 个`;
          statusEl.style.color = '#4ec9b0';
          fileInput.value = '';
          await loadMasters();
          setTimeout(() => { statusEl.textContent = ''; }, 3000);
        } else {
          statusEl.textContent = '✗ ' + (result.error || '上传失败');
          statusEl.style.color = '#f48771';
        }
      } catch (e) {
        statusEl.textContent = '✗ ' + e.message;
        statusEl.style.color = '#f48771';
      }
    }

    // 上传小号BIN
    async function uploadScoutBins() {
      const fileInput = document.getElementById('scout-bin-upload');
      const files = fileInput.files;

      if (files.length === 0) {
        alert('请先选择文件');
        return;
      }

      const statusEl = document.getElementById('scout-upload-status');
      statusEl.textContent = '上传中...';
      statusEl.style.color = '#667eea';

      try {
        const formData = new FormData();
        formData.append('type', 'scout');
        for (let i = 0; i < files.length; i++) {
          formData.append('binFile', files[i]);
        }

        const resp = await fetch('/api/boss-assist/upload-bin', {
          method: 'POST',
          body: formData
        });

        const result = await resp.json();

        if (result.success) {
          statusEl.textContent = `✓ 成功上传 ${result.count} 个`;
          statusEl.style.color = '#4ec9b0';
          fileInput.value = '';
          await loadScouts();
          setTimeout(() => { statusEl.textContent = ''; }, 3000);
        } else {
          statusEl.textContent = '✗ ' + (result.error || '上传失败');
          statusEl.style.color = '#f48771';
        }
      } catch (e) {
        statusEl.textContent = '✗ ' + e.message;
        statusEl.style.color = '#f48771';
      }
    }

    // 启动
    async function startAssist() {
      const selectedMasters = getSelectedMasters();
      if (selectedMasters.length === 0) {
        alert('请至少选择一个大号');
        return;
      }

      const selectedScouts = getSelectedScouts();
      if (selectedScouts.length === 0) {
        alert('请至少选择一个小号');
        return;
      }

      await saveConfig();

      document.getElementById('btn-start').disabled = true;
      document.getElementById('log-panel').innerHTML = '';

      try {
        const resp = await fetch('/api/boss-assist/start', { method: 'POST' });
        const result = await resp.json();

        if (result.success) {
          document.getElementById('btn-stop').disabled = false;
          startLogPolling();
        } else {
          document.getElementById('btn-start').disabled = false;
        }
      } catch (e) {
        document.getElementById('btn-start').disabled = false;
      }
    }

    // 停止
    async function stopAssist() {
      document.getElementById('btn-stop').disabled = true;

      try {
        await fetch('/api/boss-assist/stop', { method: 'POST' });
        document.getElementById('btn-start').disabled = false;
        stopLogPolling();
      } catch (e) {
        document.getElementById('btn-stop').disabled = false;
      }
    }

    // 状态轮询
    function startStatusPolling() {
      updateStatus();
      statusTimer = setInterval(updateStatus, 2000);
    }

    async function updateStatus() {
      try {
        const resp = await fetch('/api/boss-assist/status');
        const status = await resp.json();

        document.getElementById('status-running').textContent = status.running ? '运行中' : '停止';

        // 显示当前大号和进度
        if (status.masterName) {
          const progress = status.masterTotal > 1 ? ` (${status.masterIndex + 1}/${status.masterTotal})` : '';
          document.getElementById('status-master').textContent = status.masterName + progress;
        } else {
          document.getElementById('status-master').textContent = '离线';
        }

        document.getElementById('status-remain').textContent = status.masterRemainCount || 0;
        document.getElementById('status-scouts').textContent = `${status.scoutConnected || 0}/${status.scoutCount || 0}`;

        // 更新所有大号卡片的统计数据
        if (status.masterStats) {
          for (const [masterName, stats] of Object.entries(status.masterStats)) {
            const totalEl = document.getElementById(`master-${masterName}-total`);
            const successEl = document.getElementById(`master-${masterName}-success`);
            const failEl = document.getElementById(`master-${masterName}-fail`);

            if (totalEl) totalEl.textContent = stats.total || 0;
            if (successEl) successEl.textContent = stats.success || 0;
            if (failEl) failEl.textContent = stats.fail || 0;
          }
        }

        // 更新当前大号的剩余次数
        if (status.masterName) {
          const remainEl = document.getElementById(`master-${status.masterName}-remain`);
          if (remainEl) {
            remainEl.textContent = status.masterRemainCount || 0;
          }
        }

        document.getElementById('btn-start').disabled = status.running;
        document.getElementById('btn-stop').disabled = !status.running;
      } catch (e) {
        console.error('获取状态失败:', e);
      }
    }

    // 日志轮询
    function startLogPolling() {
      fetchLogs();  // 立即加载一次
      logTimer = setInterval(fetchLogs, 1000);  // 每秒刷新
    }

    function stopLogPolling() {
      if (logTimer) {
        clearInterval(logTimer);
        logTimer = null;
      }
    }

    async function fetchLogs() {
      try {
        const resp = await fetch('/api/boss-assist/logs?since=0');
        const data = await resp.json();

        const panel = document.getElementById('log-panel');

        if (!data.logs || data.logs.length === 0) {
          panel.innerHTML = '<div class="log-line info">[系统] 等待日志...</div>';
          return;
        }

        // 只取最后100条日志
        const recentLogs = data.logs.slice(-100);

        // 完全重新渲染
        let html = '';
        recentLogs.forEach(log => {
          const timeStr = log.time || '';
          const className = 'log-line ' + (log.type || 'info');
          const message = escapeHtml(log.message);
          html += `<div class="${className}">[${timeStr}] ${message}</div>`;
        });

        panel.innerHTML = html;
        panel.scrollTop = panel.scrollHeight;
      } catch (e) {
        console.error('获取日志失败:', e);
      }
    }

    // HTML转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>

</html>
